<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Escape</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Phaser locally -->
    <script src="js/phaser.min.js"></script>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container"></div>
        <div id="ui-container">
            <h3 id="level-title">Shadow Escape</h3>
            
            <div id="controls">
                <div><b>GERAK:</b> <span>WASD / Panah</span></div>
                <div><b>DECOY:</b> <span>SPASI</span></div>
                <div><b>HINT:</b> <span>H (Butuh Koin)</span></div>
            </div>

            <div id="legend">
                <div class="legend-item">
                    <div class="dot" style="background: #ffd700; border-radius: 50%; box-shadow: 0 0 10px #ffd700;"></div>
                    <div class="legend-text"><b>KOIN</b> Kumpulkan untuk Hint</div>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background: #224d22;"></div>
                    <div class="legend-text"><b>RUMPUT</b> Sembunyi Aman</div>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background: #111; border: 1px solid #444;"></div>
                    <div class="legend-text"><b>VENTILASI</b> Anti-Guard / No Decoy</div>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background: #ffff00; box-shadow: 0 0 10px #ffff00;"></div>
                    <div class="legend-text"><b>LAMPU</b> High Visibility Area</div>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background: #ffffff; box-shadow: 0 0 10px #fff;"></div>
                    <div class="legend-text"><b>CCTV</b> Laser = Game Over</div>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background: #ffaa00; box-shadow: 0 0 10px #ffaa00;"></div>
                    <div class="legend-text"><b>PENJAGA</b> AI Patroli Statis/Dinamis</div>
                </div>
            </div>
        </div>



    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
